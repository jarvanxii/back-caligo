services:
  mariadb:
    image: mariadb:11.4
    container_name: caligo-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${CALIGO_DB_NAME:-caligo}
      MARIADB_ROOT_PASSWORD: ${CALIGO_DB_ROOT_PASSWORD:-change-me-local}
    ports:
      - "3306:3306"
    volumes:
      - caligo-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caligo-mariadb-data:
