spring:
  application:
    name: back-caligo
  datasource:
    url: ${CALIGO_DB_URL:jdbc:mariadb://localhost:3306/caligo}
    username: ${CALIGO_DB_USER:root}
    password: ${CALIGO_DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${CALIGO_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

caligo:
  security:
    login-response-delay-millis: ${CALIGO_LOGIN_RESPONSE_DELAY_MILLIS:2000}
    jwt:
      secret: ${CALIGO_JWT_SECRET:caligo-local-development-secret-change-this-value-before-deploying}
      expiration-minutes: ${CALIGO_JWT_EXPIRATION_MINUTES:60}
  bootstrap:
    admin:
      username: ${CALIGO_BOOTSTRAP_ADMIN_USER:admin}
      email: ${CALIGO_BOOTSTRAP_ADMIN_EMAIL:admin@caligo.local}
      password: ${CALIGO_BOOTSTRAP_ADMIN_PASSWORD:change-me-now}
  cors:
    allowed-origins: ${CALIGO_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.0.17:5173,http://localhost:5174,http://127.0.0.1:5174,http://192.168.0.17:5174,http://localhost:5175,http://127.0.0.1:5175,http://192.168.0.17:5175}
  recon:
    allow-external-targets: ${CALIGO_RECON_ALLOW_EXTERNAL_TARGETS:false}
    max-output-bytes: ${CALIGO_RECON_MAX_OUTPUT_BYTES:1048576}
    nmap:
      binary: ${CALIGO_NMAP_BINARY:nmap}
      timeout-seconds: ${CALIGO_NMAP_TIMEOUT_SECONDS:900}
    openvas:
      gvm-cli: ${CALIGO_GVM_CLI:gvm-cli}
      socket: ${CALIGO_GVM_SOCKET:/run/gvmd/gvmd.sock}
      username: ${CALIGO_GVM_USERNAME:}
      password: ${CALIGO_GVM_PASSWORD:}
      poll-seconds: ${CALIGO_GVM_POLL_SECONDS:10}
      timeout-seconds: ${CALIGO_GVM_TIMEOUT_SECONDS:7200}
