spring:
  application:
    name: back-caligo
  datasource:
    url: ${CALIGO_DB_URL:jdbc:mariadb://localhost:3306/caligo}
    username: ${CALIGO_DB_USER:root}
    password: ${CALIGO_DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${CALIGO_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

caligo:
  security:
    login-response-delay-millis: ${CALIGO_LOGIN_RESPONSE_DELAY_MILLIS:2000}
    jwt:
      secret: ${CALIGO_JWT_SECRET:caligo-local-development-secret-change-this-value-before-deploying}
      expiration-minutes: ${CALIGO_JWT_EXPIRATION_MINUTES:480}
  bootstrap:
    admin:
      username: ${CALIGO_BOOTSTRAP_ADMIN_USER:admin}
      email: ${CALIGO_BOOTSTRAP_ADMIN_EMAIL:admin@caligo.local}
      password: ${CALIGO_BOOTSTRAP_ADMIN_PASSWORD:change-me-now}
  cors:
    allowed-origins: ${CALIGO_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://192.168.0.17:*}
  recon:
    allow-external-targets: ${CALIGO_RECON_ALLOW_EXTERNAL_TARGETS:false}
    max-output-bytes: ${CALIGO_RECON_MAX_OUTPUT_BYTES:1048576}
    nmap:
      binary: ${CALIGO_NMAP_BINARY:nmap}
      timeout-seconds: ${CALIGO_NMAP_TIMEOUT_SECONDS:900}
    openvas:
      gvm-cli: ${CALIGO_GVM_CLI:gvm-cli}
      socket: ${CALIGO_GVM_SOCKET:/run/gvmd/gvmd.sock}
      username: ${CALIGO_GVM_USERNAME:}
      password: ${CALIGO_GVM_PASSWORD:}
      poll-seconds: ${CALIGO_GVM_POLL_SECONDS:10}
      timeout-seconds: ${CALIGO_GVM_TIMEOUT_SECONDS:7200}
  bruteforce:
    allow-external-targets: ${CALIGO_BRUTEFORCE_ALLOW_EXTERNAL_TARGETS:false}
    max-output-bytes: ${CALIGO_BRUTEFORCE_MAX_OUTPUT_BYTES:1048576}
    timeout-seconds: ${CALIGO_HYDRA_TIMEOUT_SECONDS:1800}
    wordlist-roots: ${CALIGO_HYDRA_WORDLIST_ROOTS:/opt/caligo/wordlists,/usr/share/wordlists}
    hydra:
      binary: ${CALIGO_HYDRA_BINARY:hydra}
  vulnerabilities:
    allow-external-targets: ${CALIGO_VULNERABILITIES_ALLOW_EXTERNAL_TARGETS:false}
    max-output-bytes: ${CALIGO_VULNERABILITIES_MAX_OUTPUT_BYTES:1048576}
    timeout-seconds: ${CALIGO_VULNERABILITIES_TIMEOUT_SECONDS:1800}
    nuclei:
      binary: ${CALIGO_NUCLEI_BINARY:nuclei}
    searchsploit:
      binary: ${CALIGO_SEARCHSPLOIT_BINARY:searchsploit}
    nikto:
      binary: ${CALIGO_NIKTO_BINARY:nikto}
    sqlmap:
      binary: ${CALIGO_SQLMAP_BINARY:sqlmap}
  osint:
    max-output-bytes: ${CALIGO_OSINT_MAX_OUTPUT_BYTES:1048576}
    timeout-seconds: ${CALIGO_OSINT_TIMEOUT_SECONDS:600}
    sherlock:
      binary: ${CALIGO_SHERLOCK_BINARY:sherlock}
    maigret:
      binary: ${CALIGO_MAIGRET_BINARY:maigret}
    social-analyzer:
      binary: ${CALIGO_SOCIAL_ANALYZER_BINARY:social-analyzer}
    holehe:
      binary: ${CALIGO_HOLEHE_BINARY:holehe}
    theharvester:
      binary: ${CALIGO_THEHARVESTER_BINARY:theHarvester}
  passwords:
    allow-external-targets: ${CALIGO_PASSWORDS_ALLOW_EXTERNAL_TARGETS:false}
    max-output-bytes: ${CALIGO_PASSWORDS_MAX_OUTPUT_BYTES:1048576}
    timeout-seconds: ${CALIGO_PASSWORDS_TIMEOUT_SECONDS:1800}
    wordlist-roots: ${CALIGO_PASSWORDS_WORDLIST_ROOTS:/opt/caligo/wordlists,/usr/share/wordlists}
    generated-wordlist-root: ${CALIGO_PASSWORDS_GENERATED_WORDLIST_ROOT:/opt/caligo/wordlists/generated}
    john:
      binary: ${CALIGO_JOHN_BINARY:john}
    hashcat:
      binary: ${CALIGO_HASHCAT_BINARY:hashcat}
    hashid:
      binary: ${CALIGO_HASHID_BINARY:hashid}
    crunch:
      binary: ${CALIGO_CRUNCH_BINARY:crunch}
    cewl:
      binary: ${CALIGO_CEWL_BINARY:cewl}
  metasploit:
    rpc:
      host: ${CALIGO_MSF_RPC_HOST:127.0.0.1}
      port: ${CALIGO_MSF_RPC_PORT:55552}
      ssl: ${CALIGO_MSF_RPC_SSL:false}
      username: ${CALIGO_MSF_RPC_USER:caligo}
      password: ${CALIGO_MSF_RPC_PASSWORD:}
      timeout-seconds: ${CALIGO_MSF_RPC_TIMEOUT_SECONDS:20}
  network:
    vpn:
      wireguard-dir: ${CALIGO_VPN_WIREGUARD_DIR:/etc/caligo/vpn/wireguard}
      openvpn-dir: ${CALIGO_VPN_OPENVPN_DIR:/etc/caligo/vpn/openvpn}
      metadata-dir: ${CALIGO_VPN_METADATA_DIR:/etc/caligo/vpn/metadata}
      helper: ${CALIGO_VPN_HELPER:/usr/local/sbin/caligo-vpn-control}
      command-timeout-seconds: ${CALIGO_VPN_COMMAND_TIMEOUT_SECONDS:45}
