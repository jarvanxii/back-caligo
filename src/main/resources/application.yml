spring:
  application:
    name: back-caligo
  datasource:
    url: ${CALIGO_DB_URL:jdbc:postgresql://localhost:5432/caligo}
    username: ${CALIGO_DB_USER:caligo}
    password: ${CALIGO_DB_PASSWORD:caligo_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${CALIGO_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

caligo:
  security:
    jwt:
      secret: ${CALIGO_JWT_SECRET:caligo-local-development-secret-change-this-value-before-deploying}
      expiration-minutes: ${CALIGO_JWT_EXPIRATION_MINUTES:60}
  bootstrap:
    admin:
      username: ${CALIGO_BOOTSTRAP_ADMIN_USER:admin}
      email: ${CALIGO_BOOTSTRAP_ADMIN_EMAIL:admin@caligo.local}
      password: ${CALIGO_BOOTSTRAP_ADMIN_PASSWORD:change-me-now}

